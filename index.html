<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña linda 🌻</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #1a1a00 0%, #000 80%); }
        #guia {
            position: absolute; top: 25px; width: 100%; text-align: center;
            color: #ffcc00; font-family: 'Georgia', serif;
            pointer-events: none; text-shadow: 0 0 20px #ffaa00; z-index: 100;
            font-weight: bold; letter-spacing: 3px; font-style: italic; font-size: 1.2rem;
        }
        #btnMusica {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 200; background: rgba(255, 204, 0, 0.15); border: 1.5px solid #ffcc00;
            color: #ffcc00; padding: 18px 35px; cursor: pointer;
            border-radius: 50px; font-family: 'Arial', sans-serif;
            transition: all 0.4s ease; backdrop-filter: blur(8px);
            font-weight: bold; box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }
        #btnMusica:hover { background: rgba(255, 204, 0, 0.5); transform: translateX(-50%) scale(1.05); }
        /* Video oculto pero presente */
        #contenedor-video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; overflow: hidden; }
    </style>
</head>
<body>

    <div id="guia">UN UNIVERSO CREADO SOLO PARA TI 🌻✨</div>
    <button id="btnMusica">🌻 PULSA PARA ENTRAR EN NUESTRO MUNDO 🌻</button>

    <div id="contenedor-video">
        <div id="player"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // --- SECCIÓN DE AUDIO (YOUTUBE API) ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        let musicaIniciada = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1',
                width: '1',
                videoId: 'eiDiKwbGfIY',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'eiDiKwbGfIY',
                    'enablejsapi': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            const btn = document.getElementById('btnMusica');
            btn.onclick = () => {
                if (!musicaIniciada) {
                    player.unMute(); // Cambio clave: desmutar explícitamente
                    player.setVolume(100);
                    player.playVideo();
                    btn.innerText = "⏸️ NUESTRO MOMENTO";
                    musicaIniciada = true;
                } else {
                    player.pauseVideo();
                    btn.innerText = "🌻 REPRODUCIR MÚSICA 🌻";
                    musicaIniciada = false;
                }
            };
        }

        // --- TU CÓDIGO VISUAL (INTACTO CON ESCALA 110) ---
        let scene, camera, renderer, controls;
        const elementos = [];
        const coloresDorado = ["#FFD700", "#FFF700", "#FFCC00", "#E6B800"];
        const frasesConEmoji = [
            "🌻 Eres mi sol favorito", "✨ Tan linda como un girasol", "🎁 Este detalle es para ti",
            "🏠 Mi lugar seguro eres tú", "🌟 Brillas más que cualquier estrella", "😊 Sonríe siempre",
            "❤️ Te quiero con todo mi corazón", "🪄 Eres pura magia", "🙏 Gracias por existir",
            "🌼 Girasoles eternos para ti", "🥰 Mi persona favorita", "🌈 Contigo la vida es mejor",
            "☀️ Eres mi rayito de sol", "💎 Nunca dejes de brillar", "🍭 Tú haces mis días felices",
            "🎨 Girasoles para un alma linda", "🕯️ Tu sonrisa ilumina todo", "🚀 Eres única e increíble",
            "🌍 Todo este universo es tuyo", "🤝 Brillando juntos", "🌸 Mi flor eterna", 
            "💛 Eres mi felicidad", "🔥 Simplemente espectacular"
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 30, 140);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const coreGeo = new THREE.SphereGeometry(18, 32, 32);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
            scene.add(new THREE.Mesh(coreGeo, coreMat));

            const glowTexture = createGlowTexture();
            const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, color: 0xffaa00, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8 }));
            glow.scale.set(110, 110, 1); 
            scene.add(glow);

            const ring = new THREE.Mesh(new THREE.RingGeometry(22, 28, 64), new THREE.MeshBasicMaterial({ color: 0xffcc00, side: THREE.DoubleSide, transparent: true, opacity: 0.1 }));
            ring.rotation.x = Math.PI / 2.5;
            scene.add(ring);

            const starsGeo = new THREE.BufferGeometry();
            const starsPos = [];
            for(let i=0; i<15000; i++) starsPos.push((Math.random()-0.5)*1800, (Math.random()-0.5)*1800, (Math.random()-0.5)*1800);
            starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
            scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.7 })));

            for(let r=0; r<6; r++) frasesConEmoji.forEach(t => crearElementoFinal(t, true));
            for(let i=0; i<30; i++) crearElementoFinal("🌻", false);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function crearElementoFinal(texto, esTexto) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 64;
            ctx.font = esTexto ? "bold 26px Arial" : "35px Arial";
            ctx.fillStyle = coloresDorado[Math.floor(Math.random() * coloresDorado.length)];
            ctx.textAlign = "center"; ctx.fillText(texto, 256, 40);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, opacity: 0.9 }));
            const radio = 60 + (Math.random() * 30); 
            const phi = Math.acos(-1 + (Math.random() * 2)), theta = Math.random() * Math.PI * 2;
            sprite.position.set(radio * Math.sin(phi) * Math.cos(theta), radio * Math.sin(phi) * Math.sin(theta), radio * Math.cos(phi));
            if(esTexto) sprite.scale.set(38, 5, 1); else sprite.scale.set(7, 7, 1);
            elementos.push({ obj: sprite, phi, theta, radio, velocidad: 0.0006 + (Math.random() * 0.0004) });
            scene.add(sprite);
        }

        function createGlowTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.2, 'rgba(255, 200, 0, 0.9)');
            grad.addColorStop(0.5, 'rgba(255, 150, 0, 0.4)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function animate() {
            requestAnimationFrame(animate);
            elementos.forEach(el => {
                el.theta += el.velocidad;
                el.obj.position.x = el.radio * Math.sin(el.phi) * Math.cos(el.theta);
                el.obj.position.z = el.radio * Math.sin(el.phi) * Math.sin(el.theta);
                el.obj.position.y = el.radio * Math.cos(el.phi);
                el.obj.lookAt(camera.position);
            });
            scene.rotation.y += 0.0001;
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        init();
    </script>
</body>
</html>
